services:
  - type: web
    name: shanye-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # 以下变量在 Render 控制台手动填写
      - key: JWT_SECRET
        generateValue: true          # Render 自动生成随机值
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false                  # 在控制台手动设置
      - key: DATABASE_URL
        sync: false                  # 粘贴 Supabase 连接串
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_APP_SECRET
        sync: false
      - key: APPLE_IAP_SANDBOX
        value: "false"
      # 短信（可选，暂用模拟模式）
      - key: SMS_MOCK_MODE
        value: "true"
